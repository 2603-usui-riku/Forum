<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <link th:href="@{/css/style.css}" rel="styleSheet">
    <title>TOP</title>
</head>

<body>
<div class="header-contents">
    <h1>匿名掲示板</h1>
</div>
<div class="main-contents">
    <a href="/new">
        <button class="btn new-btn" type="button">新規投稿</button>
    </a>
    <div class="message-icon" th:each="content : ${contents}">
        <div>
            ID : <span th:text="${content.id}"/>
        </div>
        <div class="text">
            投稿 : <span th:text="${content.content}"/>
        </div>

        <div class="buttons">
            <a th:href="@{/{id}/edit(id=${content.id})}" class="small-btn edit-btn">
                編集
            </a>

            <form th:action="@{/{id}/delete(id=${content.id})}" th:method="delete">
                <button class="small-btn delete-btn" type="submit">
                    削除
                </button>
            </form>
        </div>
    </div>
</div>
</body>

</html>
