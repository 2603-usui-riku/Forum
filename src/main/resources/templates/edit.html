<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <link th:href="@{/css/style.css}" rel="styleSheet">
    <title>投稿編集</title>
</head>

<body>
<div class="header-contents">
    <h2>投稿編集</h2>
</div>
<div class="main-contents">
    <form th:method="put" th:action="@{/{id}/update(id=${formModel.id})}" th:object="${formModel}">
        <div class="form-area">
            <label>編集内容</label>
            <textarea class="tweet-box" th:field="*{content}" size="20" maxlength="200"/></textarea>
            <input type="submit" value="完了"/>
        </div>
    </form>
</div>
<div class="footer-contents">
    <form action="/">
        <input type="submit" value="戻る"/>
    </form>
</div>
</body>

</html>
